<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Min plan — Studievägsguiden</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
 --bg: #FAFAF7; --card: #FFFFFF; --tx: #1A1A18; --mu: #6B6B63; --li: #A8A89E;
 --bo: #E8E8E2; --ac: #7AC29A; --ah: #4A8C6A; --al: #E8F5EE; --re: #E07A7A;
 --rl: #FDEAEA; --wa: #D4A853; --wl: #FDF4E3; --bl: #5B8DB8; --bll: #E3EEF8;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* PLAN WRAP */
.plan-wrap { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; position: relative; }

/* NAV */
.plan-nav {
 background: rgba(250,250,247,.97); backdrop-filter: blur(12px);
 padding: 14px 20px 12px; border-bottom: 1px solid var(--bo);
 display: flex; align-items: center; justify-content: space-between;
 position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
.nav-logo .s1 { color: #6BA3D0; } .nav-logo .s2 { color: var(--ac); }
.nav-name {
 font-size: .78rem; font-weight: 600; color: var(--mu); background: var(--al);
 padding: 5px 12px; border-radius: 20px; cursor: pointer; position: relative;
 user-select: none; border: none; font-family: 'DM Sans', sans-serif; transition: background .15s;
}
.nav-name:active { background: #d4eddf; }
.profile-popup {
 position: absolute; top: calc(100% + 8px); right: 0;
 background: var(--card); border: 1.5px solid var(--bo); border-radius: 16px;
 box-shadow: 0 8px 32px rgba(0,0,0,.12); width: 220px; z-index: 200;
 overflow: hidden; display: none; animation: popIn .18s ease;
}
.profile-popup.open { display: block; }
@keyframes popIn { from { opacity: 0; transform: translateY(-6px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.popup-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--bo); }
.popup-name { font-weight: 700; font-size: .9rem; }
.popup-edu { font-size: .75rem; color: var(--mu); margin-top: 2px; }
.popup-btn {
 display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px;
 border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: .83rem;
 font-weight: 600; color: var(--tx); cursor: pointer; text-align: left; transition: background .12s;
}
.popup-btn:hover { background: var(--bg); }
.popup-btn .btn-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .9rem; flex-shrink: 0; }
.popup-btn .btn-sub { font-size: .7rem; color: var(--li); font-weight: 400; margin-top: 1px; }

/* TABS */
.tabs {
 display: grid; grid-template-columns: repeat(4, 1fr);
 border-bottom: 2px solid var(--bo); background: var(--card);
 position: sticky; top: 53px; z-index: 90;
}
.tab-btn {
 padding: 12px 4px 10px; border: none; background: none;
 font-family: 'DM Sans', sans-serif; font-size: .68rem; font-weight: 600;
 color: var(--li); cursor: pointer; border-bottom: 2px solid transparent;
 margin-bottom: -2px; transition: all .2s; display: flex; flex-direction: column;
 align-items: center; gap: 4px;
}
.tab-btn .tab-icon { font-size: 1rem; }
.tab-btn.act { color: var(--ac); border-bottom-color: var(--ac); }

/* PANELS */
.panel { display: none; padding: 16px 16px 80px; }
.panel.act { display: block; }

/* HERO DARK CARD */
.hero-block {
 background: linear-gradient(140deg, #1A2E1A 0%, #2D4A2D 100%);
 border-radius: 20px; padding: 20px; margin-bottom: 12px;
 position: relative; overflow: hidden;
}
.hero-block::before {
 content: ''; position: absolute; top: -40px; right: -40px;
 width: 160px; height: 160px;
 background: radial-gradient(circle, rgba(122,194,154,.15) 0%, transparent 70%);
 border-radius: 50%;
}
.hero-eyebrow { font-size: .65rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ac); margin-bottom: 6px; }
.hero-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: #fff; line-height: 1.2; margin-bottom: 4px; }
.hero-sub { font-size: .8rem; color: rgba(255,255,255,.5); margin-bottom: 20px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 12px; }
.stat-label { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: rgba(255,255,255,.45); margin-bottom: 6px; }
.stat-value { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: #fff; line-height: 1; margin-bottom: 3px; }
.stat-sub { font-size: .68rem; color: rgba(255,255,255,.5); }
.stat-card.good .stat-value { color: #7AC29A; }
.stat-card.warn .stat-value { color: #D4A853; }
.stat-card.neu .stat-value { color: #6BA3D0; }

/* CONCERN CARD */
.concern-card {
 background: var(--card); border: 1.5px solid var(--bo);
 border-radius: 14px; padding: 14px 16px; margin-bottom: 12px;
 display: flex; align-items: center; gap: 12px;
}
.concern-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
.concern-label { font-size: .72rem; font-weight: 700; color: var(--li); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.concern-stat { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--tx); line-height: 1.2; }

/* EXPAND BLOCKS */
.expand-block { background: var(--card); border: 1.5px solid var(--bo); border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
.expand-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; user-select: none; }
.expand-head-left { display: flex; align-items: center; gap: 10px; }
.expand-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.expand-title { font-weight: 700; font-size: .88rem; color: var(--tx); }
.expand-tag { font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 2px; display: inline-block; }
.expand-arrow { color: var(--li); font-size: .9rem; transition: transform .25s; flex-shrink: 0; }
.expand-block.open .expand-arrow { transform: rotate(180deg); }
.expand-body { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(0.4,0,0.2,1); }
.expand-block.open .expand-body { max-height: 800px; }
.expand-inner { padding: 0 16px 16px; border-top: 1px solid var(--bo); }
.expand-inner p { font-size: .83rem; color: var(--mu); line-height: 1.65; padding-top: 12px; }
.detail-list { list-style: none; display: grid; gap: 6px; padding-top: 12px; }
.detail-list li { display: flex; align-items: flex-start; gap: 8px; font-size: .82rem; color: var(--mu); line-height: 1.5; }
.detail-list li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--ac); flex-shrink: 0; margin-top: 6px; }
.quote-card { background: var(--al); border-left: 3px solid var(--ac); border-radius: 0 8px 8px 0; padding: 10px 12px; margin-top: 10px; font-size: .8rem; font-style: italic; color: var(--ah); line-height: 1.55; }
.quote-src { font-style: normal; font-size: .7rem; color: var(--li); margin-top: 4px; display: block; }

/* SECTION LABEL */
.section-label { font-size: .65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--li); margin: 16px 0 8px; }

/* EKONOMI */
.balance-hero { background: var(--card); border: 1.5px solid var(--bo); border-radius: 20px; padding: 20px; margin-bottom: 12px; text-align: center; }
.balance-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--li); margin-bottom: 8px; }
.balance-amount { font-family: 'DM Serif Display', serif; font-size: 2.8rem; color: var(--ah); line-height: 1; margin-bottom: 4px; }
.balance-amount.neg { color: var(--re); }
.balance-sub { font-size: .78rem; color: var(--mu); }
.balance-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--bo); }
.balance-row-item { text-align: center; }
.balance-row-item .val { font-weight: 700; font-size: .95rem; }
.balance-row-item .lbl { font-size: .65rem; color: var(--li); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
.slider-block { background: var(--card); border: 1.5px solid var(--bo); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
.slider-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.slider-name { font-size: .82rem; font-weight: 600; color: var(--tx); display: flex; align-items: center; gap: 6px; }
.slider-badge { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.slider-val { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--ah); font-weight: 700; }
input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
input[type="range"].green { background: linear-gradient(to right, var(--ac) 0%, var(--ac) var(--pct,50%), var(--bo) var(--pct,50%)); }
input[type="range"].amber { background: linear-gradient(to right, var(--wa) 0%, var(--wa) var(--pct,40%), var(--bo) var(--pct,40%)); }
input[type="range"].red { background: linear-gradient(to right, var(--re) 0%, var(--re) var(--pct,30%), var(--bo) var(--pct,30%)); }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,.2); border: 2px solid; cursor: pointer; }
input[type="range"].green::-webkit-slider-thumb { border-color: var(--ac); }
input[type="range"].amber::-webkit-slider-thumb { border-color: var(--wa); }
input[type="range"].red::-webkit-slider-thumb { border-color: var(--re); }
.slider-meta { display: flex; justify-content: space-between; font-size: .65rem; color: var(--li); margin-top: 5px; }
.hou-btn { flex: 1; padding: 6px 4px; border: 1.5px solid var(--bo); border-radius: 8px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: .68rem; font-weight: 600; color: var(--mu); cursor: pointer; transition: all .15s; }
.hou-btn.act { border-color: var(--re); background: #FFF0F0; color: var(--re); }

/* BEHÖRIGHET */
.status-hero { border-radius: 20px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
.status-hero.ok { background: var(--al); border: 1.5px solid var(--ac); }
.status-hero.warn { background: var(--wl); border: 1.5px solid var(--wa); }
.status-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.status-hero.ok .status-circle { background: var(--ac); }
.status-hero.warn .status-circle { background: var(--wa); }
.status-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 3px; }
.status-body { font-size: .8rem; color: var(--mu); line-height: 1.5; }
.req-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--bo); font-size: .83rem; }
.req-row:last-child { border-bottom: none; }
.req-name { font-weight: 600; }
.req-check { font-size: .75rem; font-weight: 700; padding: 3px 9px; border-radius: 5px; }
.req-check.ok { background: var(--al); color: var(--ah); }
.req-check.miss { background: var(--wl); color: #8B6914; }
.hp-card { background: #EEF4FF; border: 1.5px solid #B6C8EE; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
.hp-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.hp-badge { width: 34px; height: 34px; border-radius: 10px; background: #5B8DB8; color: #fff; display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 800; letter-spacing: -.5px; flex-shrink: 0; }
.hp-title { font-weight: 700; font-size: .88rem; color: #1A3A5C; }
.hp-sub { font-size: .75rem; color: #5B7A9A; margin-top: 1px; }
.hp-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.hp-pill { background: rgba(91,141,184,.15); color: #2D5F8A; font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }

/* PLAN TIMELINE */
.timeline { position: relative; padding-left: 20px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 16px; bottom: 16px; width: 2px; background: var(--bo); border-radius: 1px; }
.tl-step { position: relative; margin-bottom: 12px; }
.tl-dot { position: absolute; left: -20px; top: 14px; width: 16px; height: 16px; border-radius: 50%; background: var(--card); border: 2px solid var(--bo); display: flex; align-items: center; justify-content: center; z-index: 1; }
.tl-dot.urgent { border-color: var(--ac); background: var(--ac); }
.tl-dot.final { border-color: var(--wa); background: var(--wa); }
.tl-dot .dot-inner { width: 6px; height: 6px; border-radius: 50%; background: var(--li); }
.tl-dot.urgent .dot-inner, .tl-dot.final .dot-inner { display: none; }
.tl-dot .tick { color: #fff; font-size: .6rem; display: none; }
.tl-dot.urgent .tick, .tl-dot.final .tick { display: block; }
.tl-card { background: var(--card); border: 1.5px solid var(--bo); border-radius: 14px; overflow: hidden; }
.tl-card.urgent { border-color: var(--ac); }
.tl-card.final { border-color: var(--wa); background: var(--wl); }
.tl-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.tl-when { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--li); margin-bottom: 3px; }
.tl-card.urgent .tl-when { color: var(--ac); }
.tl-card.final .tl-when { color: var(--wa); }
.tl-title { font-weight: 700; font-size: .88rem; }
.tl-arrow { color: var(--li); font-size: .8rem; transition: transform .2s; }
.tl-step.open .tl-arrow { transform: rotate(180deg); }
.tl-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.tl-step.open .tl-body { max-height: 400px; }
.tl-inner { padding: 0 14px 14px; border-top: 1px solid var(--bo); font-size: .81rem; color: var(--mu); line-height: 1.6; padding-top: 10px; }

/* Date chips */
.date-chips { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.date-chip { padding: 6px 12px; border-radius: 20px; font-size: .72rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
.date-chip .chip-date { font-family: 'DM Serif Display', serif; font-size: .95rem; }
.date-chip .chip-label { font-size: .58rem; opacity: .8; letter-spacing: .5px; text-transform: uppercase; margin-top: 1px; }
.date-chip.ans { background: var(--wl); color: #8B6914; border: 1.5px solid var(--wa); }
.date-chip.bes { background: var(--al); color: var(--ah); border: 1.5px solid var(--ac); }
.date-chip.sta { background: #E3EEF8; color: var(--bl); border: 1.5px solid var(--bl); }

/* WHY CHANGE CARD */
.why-card {
 background: linear-gradient(140deg, #1A2E1A, #2D4A2D);
 border-radius: 16px; padding: 20px; margin-top: 20px;
 position: relative; overflow: hidden;
}
.why-card::before {
 content: ''; position: absolute; bottom: -30px; right: -30px;
 width: 120px; height: 120px;
 background: radial-gradient(circle, rgba(122,194,154,.15) 0%, transparent 70%);
}
.why-card .why-label { font-size: .65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 6px; }
.why-card .why-text { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: #fff; line-height: 1.35; }

/* AUTH GATE */
#authGate { display: none; min-height: 100vh; align-items: flex-start; justify-content: center; padding: 80px 24px 60px; }
.auth-box { background: var(--card); border: 2px solid var(--bo); border-radius: 20px; padding: 36px; max-width: 420px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.1); text-align: center; }
.fld { margin-bottom: 16px; text-align: left; }
.fld label { display: block; font-size: .78rem; font-weight: 600; color: var(--mu); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
.fld input { width: 100%; padding: 13px 15px; border: 2px solid var(--bo); border-radius: 10px; font-family: inherit; font-size: 1rem; color: var(--tx); background: var(--bg); transition: border-color .2s; }
.fld input:focus { outline: none; border-color: var(--ac); }
.btn { width: 100%; padding: 15px; background: var(--ac); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 1.02rem; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 8px; }
.btn:hover { background: var(--ah); }

/* BOTTOM HINT */
.bottom-hint { text-align: center; padding: 12px; font-size: .65rem; color: var(--li); border-top: 1px solid var(--bo); letter-spacing: .5px; text-transform: uppercase; }

/* NOT-ALONE GRID */
.alone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.alone-cell { text-align: center; padding: 10px; border-radius: 10px; }
.alone-val { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
.alone-lbl { font-size: .68rem; color: var(--mu); margin-top: 3px; line-height: 1.4; }

/* SCHOOL RECOMMENDATION */
.school-rec { background: var(--card); border: 2px solid var(--ac); border-radius: 14px; padding: 16px; margin-bottom: 8px; box-shadow: 0 4px 16px rgba(122,194,154,.1); }
.school-rec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.school-rec-badge { width: 26px; height: 26px; border-radius: 50%; background: var(--ac); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; }
.school-rec-title { font-weight: 700; font-size: .88rem; color: var(--ah); }
.school-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.school-tag { background: var(--al); color: var(--ac); padding: 3px 9px; border-radius: 5px; font-size: .7rem; font-weight: 600; }

@keyframes fu { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

// Budget slider logic 
function updateBudget() {
 const a = ans, e = edu;
 if (!a || !e) return;

 // Read all sliders
 const bidEl = document.getElementById('sl-bid');
 const lanEl = document.getElementById('sl-lan');
 const jobbEl = document.getElementById('sl-jobb');
 const boendeEl = document.getElementById('sl-boende');
 const fixedEl = document.getElementById('sl-fixed');
 const varEl = document.getElementById('sl-var');
 if (!lanEl || !boendeEl) return;

 const bidV = bidEl ? parseInt(bidEl.value) : 0;
 const lanV = parseInt(lanEl.value);
 const jobbV = jobbEl ? parseInt(jobbEl.value) : 0;
 const boendeV = parseInt(boendeEl.value);
 const fixedV = fixedEl ? parseInt(fixedEl.value) : (parseInt(a.fixed_expenses)||5000);
 const varV = varEl ? parseInt(varEl.value) : (parseInt(a.variable_expenses)||4000);

 const barnCSN = a.has_kids === 'yes' ? 2648 : 0;
 const cc2 = a.has_kids === 'yes' ? 2000 * (parseInt(a.num_kids)||1) : 0;

 const inn = bidV + barnCSN + lanV + jobbV;
 const ut = boendeV + fixedV + varV + cc2;
 const balV = inn - ut;

 // Update slider fill percentages
 const deltid2 = a.study_pace === 'parttime';
 const bidMax2 = deltid2 ? CSN_BID_DT : CSN_BID_HT;
 const lanMax2 = deltid2 ? CSN_LAN_DT : CSN_LAN_HT;
 setSliderPct('sl-bid', bidV, 0, bidMax2);
 setSliderPct('sl-lan', lanV, 0, lanMax2);
 setSliderPct('sl-jobb', jobbV, 0, 10000);
 setSliderPct('sl-boende', boendeV, 0, 12000);
 setSliderPct('sl-fixed', fixedV, 0, 15000);
 setSliderPct('sl-var', varV, 0, 10000);

 // Update value labels
 const sv = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = fmtKr(v); };
 sv('sv-bid', bidV); sv('sv-lan', lanV); sv('sv-jobb', jobbV);
 sv('sv-boende', boendeV); sv('sv-fixed', fixedV); sv('sv-var', varV);

 // Balance hero
 const balEl = document.getElementById('bal-display');
 if (balEl) { balEl.textContent = (balV >= 0 ? '+' : '') + fmtKr(balV); balEl.className = 'balance-amount' + (balV < 0 ? ' neg' : ''); }
 const subEl = document.getElementById('bal-sub');
 if (subEl) subEl.textContent = balV >= 500 ? 'Bra marginal — du klarar dig komfortabelt.' : balV >= 0 ? 'Tight men det går ihop — justera nedan.' : 'Underskott — öka lån eller extrajobb.';
 const inEl = document.getElementById('disp-in'); if (inEl) inEl.textContent = fmtKr(inn);
 const utEl = document.getElementById('disp-ut'); if (utEl) utEl.textContent = fmtKr(ut);

 // Break-even (live, based on current loan slider)
 const workNeeded2 = a.work_during === 'parttime' || a.work_status === 'parttime';
 const pm2 = workNeeded2 ? 2 : 1, ry2 = e.y * pm2;
 const loanDebt2 = lanV * Math.round(ry2 * 10);
 const yg2 = (e.s0 - sal) * 12;
 const be2 = yg2 > 0 ? Math.ceil((sal * 12 * ry2 + loanDebt2) / yg2) : 0;
 const beEl = document.getElementById('disp-be');
 if (beEl) beEl.textContent = be2 > 0 && be2 < 40 ? '~' + be2 + ' år' : '—';

 // CSN-skuld kort (live update)
 const newDebt = lanV * Math.round(ry2 * 10);
 const newRepay = newDebt > 0 ? Math.round(newDebt * 0.04 / 12) : 0;
 const newYrs = newRepay > 0 ? Math.ceil(newDebt / (newRepay * 12)) : 0;
 const stEl = document.getElementById('skuld-total'); if (stEl) stEl.textContent = '~' + fmtKr(newDebt);
 const srEl = document.getElementById('skuld-repay'); if (srEl) srEl.textContent = '~' + fmtKr(newRepay) + '/mån';
 const syEl = document.getElementById('skuld-years'); if (syEl) syEl.textContent = newYrs > 0 && newYrs < 30 ? '~' + newYrs + ' år' : '—';
}

function setSliderPct(id, val, min, max) {
 const el = document.getElementById(id);
 if (el) el.style.setProperty('--pct', ((val - min) / (max - min) * 100) + '%');
}

function setHouBtn(type, val, btn) {
 document.querySelectorAll('.hou-btn').forEach(b => b.classList.remove('act'));
 btn.classList.add('act');
 const sl = document.getElementById('sl-boende');
 if (sl) { sl.value = val; updateBudget(); }
}



// MIN-PLAN LOGIC 



async function fetchPlanByEmail() {
 const email = document.getElementById('emailInput').value.trim().toLowerCase();
 const password = document.getElementById('passwordInput').value.trim();

 if (!email || !email.includes('@')) {
 showAuthMsg('Ange en giltig e-postadress.', true);
 return;
 }
 if (!password) {
 showAuthMsg('Ange ditt lösenord.', true);
 return;
 }

 const btn = document.getElementById('fetchBtn');
 btn.textContent = 'Hämtar...';
 btn.disabled = true;

 try {
 // Hämta plan på e-post + lösenord
 const res = await fetch(
 SUPABASE_URL + '/rest/v1/plans?email=eq.' + encodeURIComponent(email) + '&password=eq.' + encodeURIComponent(password) + '&order=created_at.desc&limit=1',
 {
 headers: {
 'apikey': SUPABASE_KEY,
 'Authorization': 'Bearer ' + SUPABASE_KEY
 }
 }
 );
 const rows = await res.json();

 if (!rows || rows.length === 0) {
 showAuthMsg('Fel e-post eller lösenord. Försök igen.', true);
 btn.textContent = 'Hämta min plan →';
 btn.disabled = false;
 return;
 }

 const row = rows[0];
 ans = row.data || {};
 sal = row.salary || ans.current_salary || 0;
 edu = E.find(e => e.id === row.education_id);
 if (!edu) edu = E[0];

 const userName = ans.user_name || email.split('@')[0];

 // Spara i localStorage för nästa besök
 try { localStorage.setItem('svg_email', email); } catch(e) {}
 try { localStorage.setItem('svg_password', password); } catch(e) {}

 document.getElementById('authGate').style.display = 'none';
 document.getElementById('loadingState').style.display = 'none';
 buildFP(userName);
 document.getElementById('planContainer').style.display = 'block';

 } catch(e) {
 showAuthMsg('Något gick fel. Försök igen.', true);
 btn.textContent = 'Hämta min plan →';
 btn.disabled = false;
 }
}

function showAuthMsg(msg, isError) {
 const el = document.getElementById('authMsg');
 el.textContent = msg;
 el.style.display = 'block';
 el.style.color = isError ? 'var(--re)' : 'var(--ac)';
}

function signOut() {
 try { localStorage.removeItem('svg_email'); localStorage.removeItem('svg_password'); } catch(e) {}
 window.location.href = '/min-plan';
}

async function deleteAccount() {
 const emailEl = document.getElementById('emailInput');
 const email = (emailEl && emailEl.value) || (ans && ans.user_email) || '';
 if (!email || !email.includes('@')) {
 await svgAlert('Något gick fel. Försök logga in igen.','');
 return;
 }
 const confirmed = await svgConfirm('Är du säker? Ditt konto och all din data raderas permanent. Detta går inte att ångra.','');
 if (!confirmed) return;

 try {
 // Radera från plans
 await fetch(SUPABASE_URL + '/rest/v1/plans?email=eq.' + encodeURIComponent(email), {
 method: 'DELETE',
 headers: {
 'apikey': SUPABASE_KEY,
 'Authorization': 'Bearer ' + SUPABASE_KEY
 }
 });
 // Radera från leads
 await fetch(SUPABASE_URL + '/rest/v1/leads?email=eq.' + encodeURIComponent(email), {
 method: 'DELETE',
 headers: {
 'apikey': SUPABASE_KEY,
 'Authorization': 'Bearer ' + SUPABASE_KEY
 }
 });
 // Rensa localStorage
 try { localStorage.removeItem('svg_email'); localStorage.removeItem('svg_password'); localStorage.removeItem('svg_answers'); localStorage.removeItem('svg_lead_saved'); } catch(e) {}

 await svgAlert('Ditt konto och all din data har raderats.','');
 window.location.href = '/';
 } catch(e) {
 await svgAlert('Något gick fel. Försök igen eller kontakta hej@studievagsguiden.se','');
 }
}

async function loadPlanForUser(user) {
 
 // Hämta plan från plans-tabellen
 let planAnswers = null;
 let planEduId = null;
 let planSal = null;
 
 if (sb) {
 try {
 // Kolla plans-tabellen (paid plans)
 const { data: planData } = await sb
 .from('plans')
 .select('*')
 .eq('user_id', user.id)
 .eq('paid', true)
 .order('created_at', { ascending: false })
 .limit(1)
 .single();
 
 if (planData) {
 planEduId = planData.education_id;
 planAnswers = planData.plan_data;
 planSal = planAnswers._salary || planAnswers.salary || 0;
 } else {
 // Kolla answers-tabellen (fallback — om betalning inte registrerats än)
 const { data: ansData } = await sb
 .from('answers')
 .select('*')
 .eq('user_id', user.id)
 .order('created_at', { ascending: false })
 .limit(1)
 .single();
 
 if (ansData) {
 planEduId = ansData.education_id;
 planAnswers = ansData.data;
 planSal = ansData.salary || planAnswers._salary || 0;
 
 // Obs: plan ej betald — visa ändå (temporärt tills Stripe är klar)
 // TODO: kolla paid=true när Stripe är aktivt
 }
 }
 } catch(e) {
 console.warn('DB fetch error:', e.message);
 }
 }
 
 // Fallback: localStorage
 if (!planAnswers) {
 try {
 const saved = localStorage.getItem('svg_answers');
 if (saved) {
 planAnswers = JSON.parse(saved);
 planEduId = parseInt(localStorage.getItem('svg_edu')) || 0;
 planSal = parseInt(localStorage.getItem('svg_sal')) || 0;
 }
 } catch(e) {}
 }
 
 if (!planAnswers || !planEduId) {
 document.getElementById('loadingState').style.display = 'none';
 document.getElementById('unpaidState').style.display = 'flex';
 return;
 }
 
 // Set global state
 ans = planAnswers;
 sal = planSal;
 edu = E.find(e => e.id === planEduId);
 
 if (!edu) {
 document.getElementById('loadingState').style.display = 'none';
 document.getElementById('unpaidState').style.display = 'flex';
 return;
 }
 
 // Bygg och visa planen (full, utan blur)
 const userName = planAnswers.user_name || user.email.split('@')[0];
 buildFP(userName);
 
 document.getElementById('loadingState').style.display = 'none';
 document.getElementById('planContainer').style.display = 'block';
 
 // Spara till plans-tabellen om inte redan sparat (och betalning hanteras separat)
 // TODO: koppla till Stripe webhook
}

// Custom modal (ersätter alert/confirm)
function svgAlert(msg, icon) {
 return new Promise(resolve => {
 const m = document.getElementById('svgModal');
 document.getElementById('svgModalIcon').textContent = icon || 'ℹ';
 document.getElementById('svgModalMsg').textContent = msg;
 document.getElementById('svgModalBtns').innerHTML = '<button onclick="svgModalClose(true)" style="background:var(--ac);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer">OK</button>';
 m.style.display = 'flex';
 window._svgModalResolve = resolve;
 });
}
function svgConfirm(msg, icon) {
 return new Promise(resolve => {
 const m = document.getElementById('svgModal');
 document.getElementById('svgModalIcon').textContent = icon || '';
 document.getElementById('svgModalMsg').textContent = msg;
 document.getElementById('svgModalBtns').innerHTML = '<button onclick="svgModalClose(false)" style="background:none;border:1.5px solid var(--bo);padding:12px 22px;border-radius:8px;font-family:inherit;font-size:.92rem;cursor:pointer;color:var(--mu)">Avbryt</button><button onclick="svgModalClose(true)" style="background:var(--re);color:#fff;border:none;padding:12px 22px;border-radius:8px;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer">Ja, radera</button>';
 m.style.display = 'flex';
 window._svgModalResolve = resolve;
 });
}
function svgModalClose(val) {
 document.getElementById('svgModal').style.display = 'none';
 if (window._svgModalResolve) { window._svgModalResolve(val); window._svgModalResolve = null; }
}
